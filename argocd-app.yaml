apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: angular-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lakshmansai1999/argocd-helmchart-angular.git
    targetRevision: master
    path: angular-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
